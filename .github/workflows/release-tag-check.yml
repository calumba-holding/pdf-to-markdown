name: Release tag check

# npm publish and GitHub tagging are both manual on this repo. This check
# fails when the version in package.json is live on npm but has no matching
# v<version> git tag, so a published release can't silently go untagged.
# The daily schedule catches publishes that happen without a push to main.

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

jobs:
  release-tag-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Check npm version has a matching git tag
        run: |
          set -eu
          name="$(node -p "require('./package.json').name")"
          version="$(node -p "require('./package.json').version")"
          echo "package.json: $name@$version"

          npm_stderr="$(mktemp)"
          trap 'rm -f "$npm_stderr"' EXIT
          if ! npm view "$name@$version" version >/dev/null 2>"$npm_stderr"; then
            if grep -q 'E404' "$npm_stderr"; then
              echo "PASS: $version is not on npm yet — nothing to tag."
              exit 0
            fi

            cat "$npm_stderr" >&2
            echo "FAIL: npm view failed for $name@$version." >&2
            exit 1
          fi

          tag_ref="$(git ls-remote --tags origin "refs/tags/v$version")"
          if [ -n "$tag_ref" ]; then
            git fetch origin tag "v$version" --no-tags
            tag_version="$(
              git show "v$version:package.json" |
                node -e 'const fs = require("fs"); process.stdout.write(JSON.parse(fs.readFileSync(0, "utf8")).version)'
            )"
            if [ "$tag_version" != "$version" ]; then
              echo "tag v$version does not contain package.json version $version" >&2
              exit 1
            fi

            echo "PASS: $name@$version is on npm and tag v$version exists."
            exit 0
          fi

          echo "FAIL: $name@$version is published on npm but tag v$version does not exist."
          echo
          echo "Tag the merge commit that shipped $version and cut a release:"
          echo "  git tag v$version <sha> && git push origin v$version"
          echo "  gh release create v$version --title 'v$version — ...' --notes '...'"
          exit 1
